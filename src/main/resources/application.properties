# 1. Identificación del Microservicio
spring.application.name=ms-usuarios
server.port=8085

# 2. Configuración de la Base de Datos (H2)
# Cambiamos a usuariosdb para que coincida con tu comentario
spring.datasource.url=jdbc:h2:mem:usuariosdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# 3. Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 4. Consola H2
# Acceso en: http://localhost:8085/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Esto es vital para que la consola no pida login antes de cargar
spring.h2.console.settings.web-allow-others=true

# 5. Ajustes de Spring
spring.main.allow-bean-definition-overriding=true
spring.cloud.config.enabled=false

# 6. Configuración de Logs (Opcional, ayuda mucho a ver errores de seguridad)
logging.level.org.springframework.security=DEBUG